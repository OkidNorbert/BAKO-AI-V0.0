global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Basketball Backend
  - job_name: 'basketball-backend'
    static_configs:
      - targets: ['basketball-backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Basketball AI Service
  - job_name: 'basketball-ai-service'
    static_configs:
      - targets: ['basketball-ai-service:8001']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Basketball Frontend
  - job_name: 'basketball-frontend'
    static_configs:
      - targets: ['basketball-frontend:80']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

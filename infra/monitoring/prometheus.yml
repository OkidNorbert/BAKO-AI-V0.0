global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "basketball-backend"
    static_configs:
      - targets: ["basketball-backend-prod:8000"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  - job_name: "basketball-ai-service"
    static_configs:
      - targets: ["basketball-ai-service-prod:8001"]
    metrics_path: "/metrics"
    scrape_interval: 30s

version: '3.8'

services:
  # Production Backend
  basketball-backend-prod:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    container_name: basketball-backend-prod
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=DEBUG # Set log level to DEBUG
      - DATABASE_URL=postgresql://basketball_user:${POSTGRES_PASSWORD}@basketball-postgres-prod:5432/basketball_prod
      - REDIS_URL=redis://basketball-redis-prod:6379/0
      - AI_SERVICE_URL=http://basketball-ai-service-prod:8001
      - MINIO_ENDPOINT=basketball-minio-prod:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT} # Pass external MinIO endpoint
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    ports:
      - "8000:8000"
    depends_on:
      - basketball-postgres-prod
      - basketball-redis-prod
      - basketball-minio-prod
    networks:
      - basketball-prod
    volumes:
      - basketball-backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Production AI Service
  basketball-ai-service-prod:
    build:
      context: ../ai_service
      dockerfile: Dockerfile.prod
    container_name: basketball-ai-service-prod
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - MODEL_PATH=/app/models
      - DATA_PATH=/app/data
      - LOG_LEVEL=INFO
    ports:
      - "8001:8001"
    networks:
      - basketball-prod
    volumes:
      - basketball-ai-models:/app/models
      - basketball-ai-data:/app/data
      - basketball-ai-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Production Frontend
  basketball-frontend-prod:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    container_name: basketball-frontend-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=${REACT_APP_API_URL}
      - REACT_APP_AI_SERVICE_URL=${REACT_APP_AI_SERVICE_URL}
    ports:
      - "3000:80"
    networks:
      - basketball-prod
    depends_on:
      - basketball-backend-prod
      - basketball-ai-service-prod

  # Production Database
  basketball-postgres-prod:
    image: postgres:15-alpine
    container_name: basketball-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=basketball_prod
      - POSTGRES_USER=basketball_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - basketball-postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - basketball-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basketball_user -d basketball_prod"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Production Redis
  basketball-redis-prod:
    image: redis:7-alpine
    container_name: basketball-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - basketball-redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - basketball-prod
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Production MinIO
  basketball-minio-prod:
    image: quay.io/minio/minio:latest
    container_name: basketball-minio-prod
    restart: unless-stopped
    command: minio server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data-prod:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "9000:9000"  # Expose MinIO API port
      - "9001:9001"  # Expose MinIO Console port
    networks:
      - basketball-prod

  # Production Celery Worker
  basketball-celery-worker-prod:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    container_name: basketball-celery-worker-prod
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://basketball_user:${POSTGRES_PASSWORD}@basketball-postgres-prod:5432/basketball_prod
      - REDIS_URL=redis://basketball-redis-prod:6379/0
      - AI_SERVICE_URL=http://basketball-ai-service-prod:8001
    depends_on:
      - basketball-postgres-prod
      - basketball-redis-prod
      - basketball-ai-service-prod
    networks:
      - basketball-prod
    volumes:
      - basketball-backend-logs:/app/logs

  # Production Celery Beat (Scheduler)
  basketball-celery-beat-prod:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    container_name: basketball-celery-beat-prod
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://basketball_user:${POSTGRES_PASSWORD}@basketball-postgres-prod:5432/basketball_prod
      - REDIS_URL=redis://basketball-redis-prod:6379/0
    depends_on:
      - basketball-postgres-prod
      - basketball-redis-prod
    networks:
      - basketball-prod
    volumes:
      - basketball-backend-logs:/app/logs

  # Production Nginx (Load Balancer)
  basketball-nginx-prod:
    image: nginx:alpine
    container_name: basketball-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - basketball-nginx-logs:/var/log/nginx
    depends_on:
      - basketball-backend-prod
      - basketball-ai-service-prod
      - basketball-frontend-prod
    networks:
      - basketball-prod

  # Production Monitoring (Prometheus)
  basketball-prometheus-prod:
    image: prom/prometheus:latest
    container_name: basketball-prometheus-prod
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - basketball-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - basketball-prod

  # Production Monitoring (Grafana)
  basketball-grafana-prod:
    image: grafana/grafana:latest
    container_name: basketball-grafana-prod
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - basketball-grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - basketball-prod

networks:
  basketball-prod:
    driver: bridge

volumes:
  basketball-postgres-data:
  basketball-redis-data:
  minio-data-prod:
  basketball-backend-logs:
  basketball-ai-models:
  basketball-ai-data:
  basketball-ai-logs:
  basketball-nginx-logs:
  basketball-prometheus-data:
  basketball-grafana-data:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: basketball-ai-service
  namespace: basketball-performance
  labels:
    app: basketball-ai-service
    tier: ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: basketball-ai-service
  template:
    metadata:
      labels:
        app: basketball-ai-service
        tier: ai
    spec:
      containers:
      - name: basketball-ai-service
        image: ghcr.io/your-org/basketball-performance/ai-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: MODEL_PATH
          value: "/app/models"
        - name: DATA_PATH
          value: "/app/data"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: models
          mountPath: /app/models
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ai-models-pvc
      - name: data
        persistentVolumeClaim:
          claimName: ai-data-pvc
      - name: logs
        emptyDir: {}
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: basketball-ai-service
  namespace: basketball-performance
  labels:
    app: basketball-ai-service
spec:
  selector:
    app: basketball-ai-service
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-models-pvc
  namespace: basketball-performance
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-data-pvc
  namespace: basketball-performance
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

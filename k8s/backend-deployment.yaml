apiVersion: apps/v1
kind: Deployment
metadata:
  name: basketball-backend
  namespace: basketball-performance
  labels:
    app: basketball-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: basketball-backend
  template:
    metadata:
      labels:
        app: basketball-backend
        tier: backend
    spec:
      containers:
      - name: basketball-backend
        image: ghcr.io/your-org/basketball-performance/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: basketball-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: basketball-secrets
              key: redis-url
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: basketball-secrets
              key: jwt-secret
        - name: AI_SERVICE_URL
          value: "http://basketball-ai-service:8001"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: basketball-backend
  namespace: basketball-performance
  labels:
    app: basketball-backend
spec:
  selector:
    app: basketball-backend
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: basketball-backend-hpa
  namespace: basketball-performance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: basketball-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
